<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Portal Puzzle - Brain Edition</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; user-select: none; }
        #game-container { display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; }
        
        #header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; font-weight: bold; font-size: 18px; }
        canvas { background: #222; border: 2px solid #444; width: 100%; max-width: 500px; aspect-ratio: 1 / 1; object-fit: contain; }
        
        #gun-controls { display: flex; width: 100%; max-width: 500px; gap: 10px; padding: 10px; box-sizing: border-box; }
        .gun-btn { flex: 1; padding: 15px; text-align: center; font-weight: bold; font-size: 16px; border-radius: 8px; border: 2px solid transparent; opacity: 0.4; transition: 0.2s; }
        .gun-btn.active { opacity: 1; border-color: white; box-shadow: 0 0 10px currentColor; }
        #btn-blue { background: #0088ff; color: white; }
        #btn-orange { background: #ff7700; color: white; }

        #move-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; flex-grow: 1; }
        .move-btn { background: #444; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: bold; color: #ccc; }
        .move-btn:active { background: #666; color: white; }
        #btn-jump { background: #2ecc71; color: white; }
        #btn-jump:active { background: #27ae60; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <span id="level-text">Level 1 / 7</span>
        <span id="hint-text" style="color: #00ffcc; font-size: 14px;">화면 터치로 포탈 발사!</span>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="gun-controls">
        <div class="gun-btn active" id="btn-blue">파란색 포탈</div>
        <div class="gun-btn" id="btn-orange">주황색 포탈</div>
    </div>

    <div id="move-controls">
        <div class="move-btn" id="btn-left">◀</div>
        <div class="move-btn" id="btn-right">▶</div>
        <div class="move-btn" id="btn-jump">JUMP</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let currentLevel = 0;
let currentGun = 'blue';
const keys = { left: false, right: false, jump: false };

const player = { x: 0, y: 0, w: 16, h: 16, vx: 0, vy: 0, speed: 3.5, jumpPower: -8, grounded: false, cooldown: 0 };
const portals = { blue: null, orange: null };
let projectiles = [];

// [레벨 디자인] - 복잡한 두뇌 플레이 위주
const levels = [
    {   // 1. 튜토리얼 (단순 벽 넘기)
        start: [40, 350], goal: [350, 350], hint: "벽 너머로 가려면 양쪽에 포탈을 만드세요.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [200,200,20,180]]
    },
    {   // 2. 가속도의 법칙 (위에서 떨어지며 옆으로 튀어나가기)
        start: [50, 50], goal: [350, 50], hint: "바닥으로 깊게 떨어질수록 멀리 날아갑니다.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [0,100,100,20], [300,100,100,20], [200,100,20,280]]
    },
    {   // 3. 좁은 틈새 (플레이어는 못 가지만 총알은 통과함)
        start: [40, 350], goal: [350, 350], hint: "포탈 총알은 작은 틈새를 통과할 수 있습니다.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [200,0,20,250], [200,264,20,116]] // 14px 틈 (플레이어는 16px)
    },
    {   // 4. 낙하 굴절 (떨어지는 속도로 벽 타기)
        start: [50, 100], goal: [350, 150], hint: "높은 곳에서 떨어져 옆쪽 벽에서 튀어나오세요.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [0,150,100,20], [200,150,20,230], [280,180,100,20]]
    },
    {   // 5. 철창 감옥 (틈새 + 가속도 복합)
        start: [200, 350], goal: [50, 50], hint: "바깥쪽 천장에 포탈을 쏠 방법을 찾으세요.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [150,250,100,20], [150,250,20,130], [230,250,20,130], [0,100,100,20], [150,0,20,180]]
    },
    {   // 6. 공중 사격
        start: [50, 350], goal: [350, 50], hint: "점프한 상태로 공중에서 벽을 맞추세요.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [0,100,250,20], [300,100,100,20]]
    },
    {   // 7. 시험의 방 (지그재그 퍼즐)
        start: [50, 350], goal: [350, 350], hint: "포탈 마스터의 자격을 증명하세요.",
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [0,0,400,20], [100,300,300,20], [0,200,300,20], [100,100,300,20]]
    }
];

function initLevel(idx) {
    if (idx >= levels.length) { alert("🎉 완벽합니다! 모든 퍼즐을 풀었습니다!"); idx = 0; }
    currentLevel = idx;
    document.getElementById('level-text').innerText = `Level ${idx + 1} / 7`;
    document.getElementById('hint-text').innerText = levels[idx].hint || "";
    
    player.x = levels[idx].start[0]; player.y = levels[idx].start[1];
    player.vx = 0; player.vy = 0;
    portals.blue = null; portals.orange = null;
    projectiles = [];
}

// 조작 바인딩
function bindBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
    btn.addEventListener('mouseleave', () => keys[key] = false);
}
bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right'); bindBtn('btn-jump', 'jump');

document.getElementById('btn-blue').addEventListener('pointerdown', () => {
    currentGun = 'blue';
    document.getElementById('btn-blue').classList.add('active'); document.getElementById('btn-orange').classList.remove('active');
});
document.getElementById('btn-orange').addEventListener('pointerdown', () => {
    currentGun = 'orange';
    document.getElementById('btn-orange').classList.add('active'); document.getElementById('btn-blue').classList.remove('active');
});

// 포탈 발사 (투사체 사이즈 8px)
canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touchX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const touchY = (e.clientY - rect.top) * (canvas.height / rect.height);

    const px = player.x + player.w/2;
    const py = player.y + player.h/2;
    const angle = Math.atan2(touchY - py, touchX - px);
    
    projectiles.push({ x: px, y: py, w: 8, h: 8, vx: Math.cos(angle) * 15, vy: Math.sin(angle) * 15, color: currentGun });
});

function rectIntersect(r1, r2) {
    return !(r2.x >= r1.x + r1.w || r2.x + r2.w <= r1.x || r2.y >= r1.y + r1.h || r2.y + r2.h <= r1.y);
}

function update() {
    const level = levels[currentLevel];

    // [1. 플레이어 이동 및 물리]
    if (keys.left) player.vx -= 0.6;
    if (keys.right) player.vx += 0.6;
    player.vx *= 0.8; 
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
    
    if (keys.jump && player.grounded) { player.vy = player.jumpPower; player.grounded = false; }
    player.vy += 0.4; // 중력
    if (player.vy > 15) player.vy = 15; // 최대 낙하 속도 (가속도를 위해 상향)

    player.x += player.vx;
    player.y += player.vy;
    player.grounded = false;
    if (player.cooldown > 0) player.cooldown--;

    const pRect = {x: player.x, y: player.y, w: player.w, h: player.h};

    // [2. 텔레포트 처리 (충돌보다 먼저 판정하여 안 타지는 버그 수정)]
    if (portals.blue && portals.orange && player.cooldown === 0) {
        checkPortalTeleport(portals.blue, portals.orange);
        if(player.cooldown === 0) checkPortalTeleport(portals.orange, portals.blue);
    }

    function checkPortalTeleport(entry, exit) {
        // 포탈 인식 범위 확장 (벽에 끼기 전에 빨려들어감)
        const catchRect = { x: entry.x - 4, y: entry.y - 4, w: entry.w + 8, h: entry.h + 8 };
        if (rectIntersect(pRect, catchRect)) {
            // 출구에서 밀어내기 (포탈 크기의 절반 + 플레이어 크기)
            player.x = exit.x + exit.w/2 - player.w/2 + (exit.nx * 18);
            player.y = exit.y + exit.h/2 - player.h/2 + (exit.ny * 18);
            
            // 가속도 보존 핵심 로직
            let speed = Math.hypot(player.vx, player.vy);
            if (speed < 6) speed = 6; // 최소 튕겨나가는 속도 보장
            
            player.vx = exit.nx * speed;
            player.vy = exit.ny * speed;
            // 바닥에서 위로 솟구칠 때 중력 보정
            if (exit.ny < 0) player.vy = -Math.abs(speed * 1.2); 
            
            player.cooldown = 15; // 연속 텔레포트 방지
            pRect.x = player.x; pRect.y = player.y; // 좌표 즉시 갱신
        }
    }

    // [3. 벽 충돌 처리 (텔레포트 이후 남은 충돌 연산)]
    level.walls.forEach(w => {
        const wRect = {x: w[0], y: w[1], w: w[2], h: w[3]};
        if (rectIntersect(pRect, wRect)) {
            const overlapX = Math.min(pRect.x + pRect.w - wRect.x, wRect.x + wRect.w - pRect.x);
            const overlapY = Math.min(pRect.y + pRect.h - wRect.y, wRect.y + wRect.h - pRect.y);
            
            if (overlapX < overlapY) { // 좌우 충돌
                if (player.vx > 0) player.x = wRect.x - pRect.w;
                else player.x = wRect.x + wRect.w;
                player.vx = 0;
            } else { // 상하 충돌
                if (player.vy > 0) { player.y = wRect.y - pRect.h; player.grounded = true; }
                else player.y = wRect.y + wRect.h;
                player.vy = 0;
            }
            pRect.x = player.x; pRect.y = player.y;
        }
    });

    // [4. 투사체 이동 및 포탈 생성 (벽 끼임 버그 완벽 수정)]
    for (let i = projectiles.length - 1; i >= 0; i--) {
        let proj = projectiles[i];
        proj.x += proj.vx; proj.y += proj.vy;
        
        let hit = false;
        level.walls.forEach(w => {
            const wRect = {x: w[0], y: w[1], w: w[2], h: w[3]};
            if (!hit && rectIntersect(proj, wRect)) {
                hit = true;
                
                // 이전 프레임 위치를 역추적하여 어느 면에 부딪혔는지 판단
                let prevX = proj.x - proj.vx;
                let prevY = proj.y - proj.vy;
                let hitX = (prevX + proj.w <= wRect.x || prevX >= wRect.x + wRect.w);
                
                let nx = 0, ny = 0, pw = 32, ph = 6; // 기본: 가로 포탈(바닥/천장)
                if (hitX) { 
                    nx = (proj.vx > 0) ? -1 : 1; 
                    pw = 6; ph = 32; 
                } else { 
                    ny = (proj.vy > 0) ? -1 : 1; 
                }
                
                // 포탈이 벽을 벗어나지 않게 Clamp (끼임 버그 수정의 핵심)
                let finalX, finalY;
                if (nx !== 0) { // 세로 벽에 붙을 때
                    finalX = (nx === -1) ? wRect.x - pw : wRect.x + wRect.w;
                    finalY = Math.max(wRect.y, Math.min(proj.y - ph/2, wRect.y + wRect.h - ph));
                } else { // 가로 벽에 붙을 때
                    finalX = Math.max(wRect.x, Math.min(proj.x - pw/2, wRect.x + wRect.w - pw));
                    finalY = (ny === -1) ? wRect.y - ph : wRect.y + wRect.h;
                }
                
                portals[proj.color] = { x: finalX, y: finalY, w: pw, h: ph, nx: nx, ny: ny, color: proj.color === 'blue' ? '#0088ff' : '#ff7700' };
                projectiles.splice(i, 1);
            }
        });
    }

    // [5. 골인 및 추락 처리]
    const gRect = { x: level.goal[0] - 10, y: level.goal[1] - 10, w: 20, h: 20 };
    if (rectIntersect(pRect, gRect)) initLevel(currentLevel + 1);
    if (player.y > 450) initLevel(currentLevel); // 추락 시 재시작
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const level = levels[currentLevel];

    // 벽 렌더링
    ctx.fillStyle = '#444';
    level.walls.forEach(w => ctx.fillRect(...w));

    // 포탈 렌더링 (끼임 방지 처리된 좌표)
    Object.values(portals).forEach(p => {
        if (!p) return;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 15;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.shadowBlur = 0;
    });

    // 골인 지점
    ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(level.goal[0], level.goal[1], 15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.arc(level.goal[0], level.goal[1], 8, 0, Math.PI*2); ctx.fill();

    // 포탈 탄환
    projectiles.forEach(p => {
        ctx.fillStyle = p.color === 'blue' ? '#0088ff' : '#ff7700';
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    // 플레이어
    ctx.fillStyle = 'white';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    requestAnimationFrame(() => { update(); draw(); });
}

initLevel(0);
draw();
</script>
</body>
</html>
