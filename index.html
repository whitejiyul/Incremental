<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Boar Incremental Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 400px; text-align: center; border: 1px solid #444; }
        #val-x { font-size: 2rem; color: #00e676; margin: 15px 0; word-break: break-all; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        #start-btn { background: #2979ff; color: white; }
        #start-btn.running { background: #d50000; }
        select { padding: 10px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; }
        .debug { font-size: 0.8rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h3>🐗 멧돼지 증분기 v4 꿀꿀 🐖</h3>
    
    <label>스테이지 선택:</label>
    <select id="stage-select"></select>

    <div id="val-x">0</div>
    <div id="status-text">상태: 대기 중...</div>

    <div class="controls">
        <button id="start-btn">스테이지 시작 / 정지</button>
        <button id="reset-btn" style="background:#555; color:white;">초기화</button>
    </div>

    <div class="debug">
        틱 카운터: <span id="tick-count">0</span> | 수식: <span id="formula-display">-</span>
    </div>
</div>

<script>
    const { Decimal } = BreakInfinity;
    
    // 상태 변수
    let currentStage = 1;
    let x = new Decimal(0);
    let ticks = 0;
    let isRunning = false;
    let timer = null;

    // 17 스테이지 설정
    const stageFormulas = [
        (x) => x.add(2).log10(),              // 1
        (x) => x.pow(0.1).add(1),             // 2
        (x) => x.pow(0.25).add(1),            // 3
        (x) => x.pow(0.5).add(1),             // 4
        (x) => x.add(1).div(2),               // 5
        (x) => x.add(1),                      // 6
        (x) => x.add(x.add(1).log10()),       // 7
        (x) => x.add(5),                      // 8
        (x) => x.add(10),                     // 9
        (x) => x.add(x.pow(0.01)),            // 10
        (x) => x.add(x.pow(0.05)).add(1),     // 11
        (x) => x.mul(1.05),                   // 12
        (x) => x.add(x.add(10).log10()),      // 13
        (x) => x.mul(x.add(1).sqrt()),        // 14
        (x) => x.add(100),                    // 15
        (x) => x.add(x.sqrt()),               // 16
        (x) => x.pow(2)                       // 17
    ];

    // UI 요소
    const valDisplay = document.getElementById('val-x');
    const startBtn = document.getElementById('start-btn');
    const select = document.getElementById('stage-select');
    const statusText = document.getElementById('status-text');
    const tickDisplay = document.getElementById('tick-count');
    const formulaDisplay = document.getElementById('formula-display');

    // 초기화 및 이벤트 등록
    function init() {
        for(let i=1; i<=17; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = "STAGE " + i;
            select.appendChild(opt);
        }
        select.value = currentStage;
    }

    function update() {
        valDisplay.innerText = x.toString().slice(0, 15);
        tickDisplay.innerText = ticks;
        formulaDisplay.innerText = "Stage " + currentStage + " 공식 적용";
    }

    function tick() {
        ticks++;
        x = stageFormulas[currentStage-1](x);
        // 에러 방지 (NaN 방지)
        if (x.isNaN()) x = new Decimal(0);
        update();
    }

    startBtn.onclick = () => {
        if (isRunning) {
            clearInterval(timer);
            isRunning = false;
            startBtn.classList.remove('running');
            statusText.innerText = "상태: 멈춤";
        } else {
            timer = setInterval(tick, 50);
            isRunning = true;
            startBtn.classList.add('running');
            statusText.innerText = "상태: 작동 중! 꿀꿀 🐖";
        }
    };

    document.getElementById('reset-btn').onclick = () => {
        x = new Decimal(0);
        ticks = 0;
        update();
    };

    select.onchange = () => {
        currentStage = parseInt(select.value);
        x = new Decimal(0);
        ticks = 0;
        update();
    };

    init();
    update();
</script>
</body>
</html>
