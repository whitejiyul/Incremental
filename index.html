<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 공식 틱 시뮬레이터</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #4a5568;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: monospace;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 120px;
        }
        button.primary { background-color: #3b82f6; color: white; }
        button.primary:hover { background-color: #2563eb; }
        button.success { background-color: #10b981; color: white; }
        button.success:hover { background-color: #059669; }
        button.danger { background-color: #ef4444; color: white; }
        button.danger:hover { background-color: #dc2626; }
        button.secondary { background-color: #64748b; color: white; }
        button.secondary:hover { background-color: #475569; }
        
        .status-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-top: 15px;
        }
        .status-box {
            background: #edf2f7;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
        }
        .status-box span {
            display: block;
            font-size: 1.2rem;
            color: #2b6cb0;
            margin-top: 5px;
        }
        .log-box {
            background: #1e293b;
            color: #38bdf8;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }
        .help-text {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>사용자 정의 공식 틱 시뮬레이터</h1>

    <div class="section">
        <div class="section-title">💡 변수 업데이트 공식 설정 (JavaScript 문법 적용)</div>
        <div class="help-text">사용 가능한 요소: 현재 틱(t), 이전 틱의 변수들(x, y, z, a, b, c), Math.log(값), Math.pow(밑, 지수) 또는 밑**지수</div>
        <div class="grid" style="margin-top: 10px;">
            <div>
                <label>x = </label>
                <input type="text" id="formula_x" value="x + 1">
            </div>
            <div>
                <label>y = </label>
                <input type="text" id="formula_y" value="y + t">
            </div>
            <div>
                <label>z = </label>
                <input type="text" id="formula_z" value="x * y">
            </div>
            <div>
                <label>a = </label>
                <input type="text" id="formula_a" value="Math.pow(2, t)">
            </div>
            <div>
                <label>b = </label>
                <input type="text" id="formula_b" value="Math.log(x + 1)">
            </div>
            <div>
                <label>c = </label>
                <input type="text" id="formula_c" value="a / (b + 1)">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">⚙️ 초기 변수 값 설정 (t = 0 일 때)</div>
        <div class="grid">
            <div><label>초기 x:</label><input type="number" id="init_x" value="0"></div>
            <div><label>초기 y:</label><input type="number" id="init_y" value="0"></div>
            <div><label>초기 z:</label><input type="number" id="init_z" value="0"></div>
            <div><label>초기 a:</label><input type="number" id="init_a" value="1"></div>
            <div><label>초기 b:</label><input type="number" id="init_b" value="0"></div>
            <div><label>초기 c:</label><input type="number" id="init_c" value="0"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🕹️ 실행 제어 패널</div>
        <div class="grid">
            <div>
                <label>자동 실행 주기 (초):</label>
                <input type="number" id="interval_sec" value="1" step="0.1" min="0.1">
            </div>
            <div>
                <label>목표 틱 제한 (0 이면 영원히):</label>
                <input type="number" id="max_ticks" value="0" min="0">
            </div>
        </div>
        
        <div class="controls">
            <button class="primary" id="btn_step">수동 (한 틱만)</button>
            <button class="success" id="btn_start">자동 시작</button>
            <button class="danger" id="btn_stop" disabled>정지</button>
            <button class="secondary" id="btn_reset">리셋</button>
        </div>

        <div class="status-panel">
            <div class="status-box">현재 상태<span id="status_text" style="color:#64748b;">대기중</span></div>
            <div class="status-box">현재 틱 (t)<span id="status_t">0</span></div>
            <div class="status-box">목표 틱 제한<span id="status_max">영원히</span></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📊 시뮬레이션 로그 출력 (최근 50개)</div>
        <div class="log-box" id="log_output">시뮬레이션을 시작하세요...</div>
    </div>
</div>

<script>
    // 시뮬레이션 내부 변수 상태
    let state = { t: 0, x: 0, y: 0, z: 0, a: 0, b: 0, c: 0 };
    let timerId = null;
    let isRunning = false;

    // DOM 요소 캐싱
    const inputs = {
        x: document.getElementById('init_x'), y: document.getElementById('init_y'), z: document.getElementById('init_z'),
        a: document.getElementById('init_a'), b: document.getElementById('init_b'), c: document.getElementById('init_c')
    };
    const formulas = {
        x: document.getElementById('formula_x'), y: document.getElementById('formula_y'), z: document.getElementById('formula_z'),
        a: document.getElementById('formula_a'), b: document.getElementById('formula_b'), c: document.getElementById('formula_c')
    };
    const logOutput = document.getElementById('log_output');
    const statusT = document.getElementById('status_t');
    const statusMax = document.getElementById('status_max');
    const statusText = document.getElementById('status_text');

    const btnStep = document.getElementById('btn_step');
    const btnStart = document.getElementById('btn_start');
    const btnStop = document.getElementById('btn_stop');
    const btnReset = document.getElementById('btn_reset');

    // 초기화 함수
    function resetSimulation() {
        stopSimulation();
        state.t = 0;
        state.x = parseFloat(inputs.x.value) || 0;
        state.y = parseFloat(inputs.y.value) || 0;
        state.z = parseFloat(inputs.z.value) || 0;
        state.a = parseFloat(inputs.a.value) || 0;
        state.b = parseFloat(inputs.b.value) || 0;
        state.c = parseFloat(inputs.c.value) || 0;
        
        const maxTicks = parseInt(document.getElementById('max_ticks').value) || 0;
        statusMax.innerText = maxTicks === 0 ? "영원히" : maxTicks + " 틱";
        statusT.innerText = state.t;
        
        logOutput.innerHTML = `[초기화 완료] t=${state.t} -> x:${state.x}, y:${state.y}, z:${state.z}, a:${state.a}, b:${state.b}, c:${state.c}\n`;
    }

    // 안전하게 공식을 계산하는 함수
    function evalFormula(formulaStr, currentVars) {
        try {
            // 자바스크립트의 Math 함수들을 편리하게 쓸 수 있도록 주입
            const context = {
                t: currentVars.t, x: currentVars.x, y: currentVars.y, z: currentVars.z,
                a: currentVars.a, b: currentVars.b, c: currentVars.c,
                Math: Math,
                log: Math.log, log10: Math.log10, pow: Math.pow,
                sin: Math.sin, cos: Math.cos, tan: Math.tan
            };
            
            // 공식을 실행할 dynamic function 생성
            const fn = new Function(...Object.keys(context), `return (${formulaStr});`);
            const result = fn(...Object.values(context));
            
            return isNaN(result) || !isFinite(result) ? 0 : result;
        } catch (e) {
            return null; // 에러 발생 시 처리
        }
    }

    // 1 틱 실행 함수
    function runTick() {
        const maxTicks = parseInt(document.getElementById('max_ticks').value) || 0;
        
        // 목표 틱 도달 시 자동 정지
        if (maxTicks > 0 && state.t >= maxTicks) {
            logOutput.innerHTML = `[목표 도달] 지정한 ${maxTicks}틱에 도달하여 종료합니다.\n` + logOutput.innerHTML;
            stopSimulation();
            return;
        }

        // 다음 틱 진행
        state.t++;

        // 동시 업데이트를 위해 이전 값 보존 후 새 값 계산
        const prev = { ...state };
        let errors = [];

        ['x', 'y', 'z', 'a', 'b', 'c'].forEach(varName => {
            const fStr = formulas[varName].value;
            const res = evalFormula(fStr, prev);
            if (res === null) {
                errors.push(varName);
                state[varName] = prev[varName]; // 에러 시 이전 값 유지
            } else {
                state[varName] = res;
            }
        });

        // UI 업데이트
        statusT.innerText = state.t;
        
        // 로그 포맷팅 (소수점 4자리까지 끊어서 가독성 확보)
        let logStr = `[틱 ${state.t}] `;
        if (errors.length > 0) logStr += `⚠️(공식 에러 변수: ${errors.join(',')}) `;
        logStr += `x:${state.x.toFixed(4)} | y:${state.y.toFixed(4)} | z:${state.z.toFixed(4)} | a:${state.a.toFixed(4)} | b:${state.b.toFixed(4)} | c:${state.c.toFixed(4)}\n`;
        
        // 최근 로그가 맨 위로 올라오도록 추가
        const currentLogs = logOutput.innerHTML.split('\n');
        if (currentLogs.length > 50) currentLogs.pop(); // 로그 최대 50개 유지
        logOutput.innerHTML = logStr + currentLogs.join('\n');
    }

    // 자동 실행 시작
    function startSimulation() {
        if (isRunning) return;
        isRunning = true;
        statusText.innerText = "자동 실행중";
        statusText.style.color = "#10b981";
        
        btnStart.disabled = true;
        btnStep.disabled = true;
        btnStop.disabled = false;

        const interval = (parseFloat(document.getElementById('interval_sec').value) || 1) * 1000;
        timerId = setInterval(runTick, interval);
    }

    // 자동 실행 정지
    function stopSimulation() {
        if (!isRunning) return;
        isRunning = false;
        statusText.innerText = "일시정지";
        statusText.style.color = "#ef4444";
        
        btnStart.disabled = false;
        btnStep.disabled = false;
        btnStop.disabled = true;

        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }
    }

    // 이벤트 리스너 등록
    btnStep.addEventListener('click', () => {
        statusText.innerText = "수동 제어";
        statusText.style.color = "#3b82f6";
        runTick();
    });
    btnStart.addEventListener('click', startSimulation);
    btnStop.addEventListener('click', stopSimulation);
    btnReset.addEventListener('click', resetSimulation);

    // 페이지 로드 시 초기화 실행
    window.onload = resetSimulation;
</script>

</body>
</html>
