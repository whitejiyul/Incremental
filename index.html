<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인크리멘탈 IDLE 게임 V2</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: #2a2a35;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #4caf50; margin-top: 0; }
        .stats {
            background: #333344;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .section-title {
            border-bottom: 2px solid #444;
            padding-bottom: 5px;
            margin-top: 20px;
            color: #81c784;
        }
        .upgrade-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-upgrade-btn { flex: 1; }
        .max-btn {
            background-color: #0288d1;
            width: 110px;
            text-align: center;
            justify-content: center;
            font-weight: bold;
        }
        .max-btn:hover { background-color: #0277bd; }
        .btn:hover { background-color: #45a049; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn { background-color: #e91e63; width: 100%; }
        .reset-btn:hover { background-color: #d81b60; }
        .auto-container {
            background: #2e3b4e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #4f6888;
        }
        .info-text { font-size: 0.85rem; color: #bbb; }
        .bonus-text { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>자동 인크리멘탈 게임 V2</h1>
    
    <div class="stats">
        <div>보유 포인트: <span id="points" class="highlight">0.0</span> p</div>
        <div>초당 생산량 (인컴): <span id="pps" class="highlight">1.0</span> p/s</div>
        <div>리셋 횟수: <span id="reset-count">0</span>회 (기본 배수: <span id="reset-multiplier">x1</span>)</div>
        <div id="five-reset-bonus-display" class="info-text" style="display:none;">
            ★ 5회차 이상 리셋 보너스: 모든 업글 베이스 <span class="bonus-text" id="special-bonus-val">+0.00</span> 적용 중!
        </div>
    </div>

    <h3 class="section-title">리셋 (Prestige)</h3>
    <button id="reset-button" class="btn reset-btn" onclick="prestige()">
        <div>
            <strong>다음 단계로 리셋</strong><br>
            <span class="info-text">업그레이드 추가 해금, 배수 상승 (5회부터 특수 보너스 & 자동화)</span>
        </div>
        <span id="reset-cost">비용: 100 p</span>
    </button>

    <h3 class="section-title">업그레이드 목록</h3>
    <div id="upgrades-container">
        </div>

    <div id="automation-section" style="display: none;">
        <h3 class="section-title">자동화 시스템 (리셋 5회 보상)</h3>
        <div class="auto-container">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                <div>
                    <strong>자동 구매기 (Auto Buyer)</strong><br>
                    <span class="info-text">해금된 업그레이드 중 살 수 있는 가장 싼 것을 자동으로 구매합니다.</span><br>
                    <span class="info-text">현재 작동 주기: <span id="auto-interval-display" class="highlight">1.00</span>초</span>
                </div>
                <div>
                    <label style="cursor:pointer; font-weight:bold;">
                        <input type="checkbox" id="auto-toggle" checked style="transform: scale(1.2); margin-right:5px;"> 작동 활성화
                    </label>
                </div>
            </div>
            <button id="auto-speed-btn" class="btn" style="background-color:#7e57c2; width:100%;" onclick="buyAutoSpeed()">
                <div>
                    <strong>자동화 주기 단축 (Lv.<span id="auto-level">0</span>)</strong><br>
                    <span class="info-text">다음 주기: <span id="auto-next-interval">0.00</span>초로 단축</span>
                </div>
                <span id="auto-speed-cost">비용: 1,000 p</span>
            </button>
        </div>
    </div>
</div>

<script>
    // 게임 데이터 상태
    let state = {
        points: 0,
        resetCount: 0,
        autoLevel: 0,
        upgrades: {}
    };

    // 1~24번째 업그레이드 데이터 생성 및 초기화
    function initUpgrades() {
        state.upgrades[1] = { amount: 0, cost: 5, isFixedCost: true, basePps: 1 };
        for (let i = 2; i <= 24; i++) {
            state.upgrades[i] = {
                amount: 0,
                cost: 5 * Math.pow(10, i),
                isFixedCost: true, // 문제 조건 상 가격이 고정이므로 true
                basePps: 0
            };
        }
    }
    initUpgrades();

    // 표기법 변환 함수
    function format(num) {
        if (num >= 1e9) return num.toExponential(2);
        return num.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    }

    // 리셋 비용 공식
    function getResetCost() {
        let amt = state.resetCount;
        let exponent = amt + Math.pow(1.01, amt);
        return Math.pow(100, exponent);
    }

    // 자동화 업그레이드 비용 공식: 1000^amount
    function getAutoSpeedCost() {
        return Math.pow(1000, state.autoLevel);
    }

    // 자동화 주기 계산 공식: 1초 / (Lv * 0.2 + 1)
    function getAutoInterval() {
        return 1 / (state.autoLevel * 0.2 + 1);
    }

    // 5회차 이상 리셋 시 제공되는 모든 업글 베이스 추가치 (+0.05 * resetCount)
    function getFiveResetBonus() {
        if (state.resetCount >= 5) {
            return 0.05 * state.resetCount;
        }
        return 0;
    }

    // 초당 총 생산량(PPS) 계산 내부 로직
    function calculateTotalPps() {
        let bonus = {};
        let specialBonus = getFiveResetBonus();
        for (let i = 1; i <= 24; i++) bonus[i] = specialBonus; // 5회차 보너스 기본 탑재

        // n번째 업그레이드가 n-1번째 업그레이드 베이스를 증가시킴 (+0.2 * amount)
        for (let i = 24; i >= 2; i--) {
            if (state.upgrades[i].amount > 0) {
                bonus[i - 1] += 0.2 * state.upgrades[i].amount;
            }
        }

        let totalBase = 1; // 기본 시작 보너스 1 p/s
        for (let i = 1; i <= 24; i++) {
            let upg = state.upgrades[i];
            let effectiveBase = upg.basePps + bonus[i];
            totalBase += effectiveBase * upg.amount;
        }

        return totalBase * (state.resetCount + 1);
    }

    // 일반 개별 구매
    function buyUpgrade(id) {
        let upg = state.upgrades[id];
        if (state.points >= upg.cost) {
            state.points -= upg.cost;
            upg.amount++;
            updateUI();
        }
    }

    // 최대 구매(Max Buy) 구현
    function buyMaxUpgrade(id) {
        let upg = state.upgrades[id];
        if (state.points >= upg.cost) {
            // 가격이 고정이므로 살 수 있는 개수는 [보유포인트 / 고정가격] 의 정수 몫입니다.
            let maxAmount = Math.floor(state.points / upg.cost);
            if (maxAmount > 0) {
                state.points -= (maxAmount * upg.cost);
                upg.amount += maxAmount;
                updateUI();
            }
        }
    }

    // 자동화 속도 업그레이드 구매
    function buyAutoSpeed() {
        let cost = getAutoSpeedCost();
        if (state.points >= cost) {
            state.points -= cost;
            state.autoLevel++;
            updateUI();
            restartAutoTimer(); // 타이머 주기 갱신을 위해 재시작
        }
    }

    // 리셋 실행
    function prestige() {
        let cost = getResetCost();
        if (state.points >= cost) {
            state.points = 0;
            state.resetCount++;
            
            // 모든 일반 업그레이드 개수 초기화
            for (let i = 1; i <= 24; i++) {
                state.upgrades[i].amount = 0;
            }
            // 자동화 레벨은 유지 여부 명시가 없으므로 방치형 게임 문법에 따라 유지하도록 설계했습니다.
            
            updateUI();
            restartAutoTimer();
        }
    }

    // UI 동적 및 전체 업데이트
    function updateUI() {
        let currentPps = calculateTotalPps();
        document.getElementById('points').innerText = format(state.points);
        document.getElementById('pps').innerText = format(currentPps);
        document.getElementById('reset-count').innerText = state.resetCount;
        document.getElementById('reset-multiplier').innerText = "x" + (state.resetCount + 1);

        // 5회 리셋 보너스 정보 출력 제어
        let sBonus = getFiveResetBonus();
        if (sBonus > 0) {
            document.getElementById('five-reset-bonus-display').style.display = 'block';
            document.getElementById('special-bonus-val').innerText = "+" + sBonus.toFixed(2);
        } else {
            document.getElementById('five-reset-bonus-display').style.display = 'none';
        }

        // 리셋 버튼 설정
        let resetCost = getResetCost();
        document.getElementById('reset-cost').innerText = "비용: " + format(resetCost) + " p";
        document.getElementById('reset-button').disabled = state.points < resetCost;

        // 자동화 섹션 노출 제어 (리셋 5회 이상 시 해금)
        if (state.resetCount >= 5) {
            document.getElementById('automation-section').style.display = 'block';
            let autoCost = getAutoSpeedCost();
            let currentInt = getAutoInterval();
            let nextInt = 1 / ((state.autoLevel + 1) * 0.2 + 1);

            document.getElementById('auto-level').innerText = state.autoLevel;
            document.getElementById('auto-interval-display').innerText = currentInt.toFixed(3);
            document.getElementById('auto-next-interval').innerText = nextInt.toFixed(3);
            document.getElementById('auto-speed-cost').innerText = "비용: " + format(autoCost) + " p";
            document.getElementById('auto-speed-btn').disabled = state.points < autoCost;
        } else {
            document.getElementById('automation-section').style.display = 'none';
        }

        // 업그레이드 리스트 그리기
        let container = document.getElementById('upgrades-container');
        container.innerHTML = '';

        let unlockedCount = Math.min(24, 1 + state.resetCount);

        // 각 업글별 현재 시너지 수치 사전 계산
        let bonus = {};
        for (let i = 1; i <= 24; i++) bonus[i] = sBonus;
        for (let i = 24; i >= 2; i--) {
            bonus[i - 1] += 0.2 * state.upgrades[i].amount;
        }

        for (let i = 1; i <= unlockedCount; i++) {
            let upg = state.upgrades[i];
            
            let row = document.createElement('div');
            row.className = 'upgrade-row';

            // 메인 구매 버튼
            let mainBtn = document.createElement('button');
            mainBtn.className = 'btn main-upgrade-btn';
            mainBtn.disabled = state.points < upg.cost;
            mainBtn.onclick = () => buyUpgrade(i);

            let effectText = (i === 1) ? `기본 +${upg.basePps} p/s` : `업글 ${i-1} 베이스 증가 (+0.2×개수)`;
            let bonusText = bonus[i] > 0 ? ` <span style="color:#00e676;">(+${bonus[i].toFixed(2)} 효과)</span>` : "";

            mainBtn.innerHTML = `
                <div>
                    <strong>업그레이드 ${i}</strong> [${upg.amount}개]<br>
                    <span class="info-text">${effectText}${bonusText}</span>
                </div>
                <span>${format(upg.cost)} p</span>
            `;

            // 최대 구매 버튼
            let maxBtn = document.createElement('button');
            maxBtn.className = 'btn max-btn';
            let maxAmt = Math.floor(state.points / upg.cost);
            maxBtn.disabled = maxAmt <= 0;
            maxBtn.innerHTML = `MAX<br><span style="font-size:0.75rem; font-weight:normal;">(+${maxAmt})</span>`;
            maxBtn.onclick = () => buyMaxUpgrade(i);

            row.appendChild(mainBtn);
            row.appendChild(maxBtn);
            container.appendChild(row);
        }
    }

    // --- 자동화 시스템 루프 제어 ---
    let autoTimer = null;

    function executeAutoBuy() {
        // 자동화 체크박스가 켜져있고 리셋 5회 이상일 때만 작동
        if (state.resetCount < 5 || !document.getElementById('auto-toggle').checked) return;

        let unlockedCount = Math.min(24, 1 + state.resetCount);
        let targetId = -1;
        let minCost = Infinity;

        // 해금된 업그레이드 중 가장 저렴하며 현재 살 수 있는 것 탐색
        for (let i = 1; i <= unlockedCount; i++) {
            let upg = state.upgrades[i];
            if (state.points >= upg.cost && upg.cost < minCost) {
                minCost = upg.cost;
                targetId = i;
            }
        }

        // 대상을 찾았다면 1개 자동 구매 진행
        if (targetId !== -1) {
            buyUpgrade(targetId);
        }
    }

    function restartAutoTimer() {
        if (autoTimer) clearInterval(autoTimer);
        if (state.resetCount >= 5) {
            let intervalMs = getAutoInterval() * 1000;
            autoTimer = setInterval(executeAutoBuy, intervalMs);
        }
    }


    // --- 메인 게임 스케줄러 루프 (0.1초마다 가동) ---
    setInterval(() => {
        let pps = calculateTotalPps();
        state.points += pps / 10;
        
        // 부드럽게 숫자가 올라가도록 메인 텍스트만 실시간 밀어넣기
        document.getElementById('points').innerText = format(state.points);
        document.getElementById('pps').innerText = format(pps);
        
        // 연산 최적화를 위해 버튼의 실시간 활성/비활성 상태 및 서브 텍스트 수치만 제어
        let resetCost = getResetCost();
        document.getElementById('reset-button').disabled = state.points < resetCost;

        if (state.resetCount >= 5) {
            document.getElementById('auto-speed-btn').disabled = state.points < getAutoSpeedCost();
        }

        let container = document.getElementById('upgrades-container');
        let rows = container.getElementsByClassName('upgrade-row');
        let unlockedCount = Math.min(24, 1 + state.resetCount);

        if (rows.length === unlockedCount) {
            for (let i = 1; i <= unlockedCount; i++) {
                let upg = state.upgrades[i];
                let row = rows[i-1];
                let mainBtn = row.getElementsByClassName('main-upgrade-btn')[0];
                let maxBtn = row.getElementsByClassName('max-btn')[0];

                mainBtn.disabled = state.points < upg.cost;
                
                let maxAmt = Math.floor(state.points / upg.cost);
                maxBtn.disabled = maxAmt <= 0;
                maxBtn.getElementsByTagName('span')[0].innerText = `(+${maxAmt})`;
            }
        } else {
            updateUI();
        }
    }, 100);

    // 초기 가동 시작
    updateUI();
    restartAutoTimer();
</script>

</body>
</html>
