<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 인크리멘탈 게임 v2</title>
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js"></script>
    <style>
        /* 검은 바탕에 하얀 텍스트 테마 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .game-container {
            text-align: center;
            border: 1px solid #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            max-width: 480px;
            width: 90%;
        }

        .title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .resource-display {
            margin-bottom: 25px;
        }

        .points {
            font-size: 2.6rem;
            font-weight: bold;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .pps {
            font-size: 1rem;
            color: #aaaaaa;
        }

        .upgrade-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        /* 버튼 디자인 */
        button {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 15px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        button:hover:not(:disabled) {
            background-color: #ffffff;
            color: #000000;
        }

        button:disabled {
            border-color: #333333;
            color: #555555;
            cursor: not-allowed;
        }

        .btn-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-weight: bold;
        }

        .btn-sub {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row button { flex: 1; }
        .max-btn { max-width: 90px; text-align: center; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="title">INCREMENTAL SYSTEM v2</div>
    
    <div class="resource-display">
        <div class="points" id="points-display">0</div>
        <div class="pps">초당 생산량 (PPS): <span id="pps-display">1</span></div>
    </div>

    <div class="upgrade-container">
        <div class="btn-row">
            <button id="btn-upgrade1" onclick="buyUpgrade1()" style="flex: 1;">
                <div class="btn-header">
                    <span>업그레이드 1</span>
                    <span>보유: <span id="up1-amount">0</span></span>
                </div>
                <div class="btn-sub">가격: 5 포인트 (고정) | 효과: 초당 생산량 +1</div>
            </button>
            <button id="btn-buy-max" class="max-btn" onclick="buyMaxUpgrade1()" style="display: none;">
                <strong>MAX</strong>
            </button>
        </div>

        <button id="btn-reset1" onclick="triggerReset1()">
            <div class="btn-header">
                <span>리셋 1</span>
                <span>단계: <span id="reset1-amount">0</span></span>
            </div>
            <div class="btn-sub">가격: <span id="reset1-cost">100</span> 포인트 | 효과: 생산 배수 +x1 (진행도 리셋)</div>
        </button>

        <button id="btn-reset2" onclick="triggerReset2()">
            <div class="btn-header">
                <span>리셋 2</span>
                <span>단계: <span id="reset2-amount">0</span></span>
            </div>
            <div class="btn-sub">가격: <span id="reset2-cost">1.79e308</span> 포인트 | 효과: 생산량 * 2^amount, 무한 돌파</div>
        </button>
    </div>
</div>

<script>
    // --- BreakInfinity 단축 선언 ---
    const D = (val) => new Decimal(val);

    // --- 게임 데이터 초기화 (Decimal 객체 사용) ---
    let points = D(0);
    let upgrade1 = D(0);
    let reset1 = 0; // 정수형태 유지
    let reset2 = 0; // 정수형태 유지

    // 기본 한계치 및 리셋2 고정가격 (1.7976e308)
    const MAX_BEFORE_BREAK = D("1.7976931348623157e308");

    // --- 수식 및 계산 함수 ---
    
    // 초당 생산량 (PPS) 계산: (1 + 업그레이드1) * (1 + 리셋1) * (2^리셋2)
    function getPPS() {
        let basePPS = upgrade1.add(1);
        let r1Multiplier = D(1 + reset1);
        let r2Multiplier = D(2).pow(reset2);
        
        return basePPS.mul(r1Multiplier).mul(r2Multiplier);
    }

    // 리셋 1 비용 계산: 100^(reset1 + 1)
    function getReset1Cost() {
        return D(100).pow(reset1 + 1);
    }

    // 리셋 2 비용 계산: 고정 infinite (1.79e308)
    function getReset2Cost() {
        return MAX_BEFORE_BREAK;
    }

    // 최대 허용 가능한 업그레이드 1 수치 구하기
    function getMaxUpgrade1Limit() {
        // 리셋2를 한 번도 안 했다면 1.8e308 제한, 리셋2를 했다면 사실상 무한대 허용
        return (reset2 > 0) ? D("1e1000") : D("1.8e308");
    }

    // 표기법 포맷터 (BreakInfinity 기본 기능 활용)
    function formatNumber(decimalObj) {
        if (decimalObj.gte(1e6)) {
            return decimalObj.toExponential(2).replace('+', '');
        }
        return Math.floor(decimalObj.toNumber()).toLocaleString();
    }

    // --- UI 업데이트 ---
    function updateUI() {
        const currentPPS = getPPS();
        const r1Cost = getReset1Cost();
        const r2Cost = getReset2Cost();
        const maxUp1 = getMaxUpgrade1Limit();

        document.getElementById('points-display').innerText = formatNumber(points);
        document.getElementById('pps-display').innerText = formatNumber(currentPPS);
        document.getElementById('up1-amount').innerText = formatNumber(upgrade1);
        document.getElementById('reset1-amount').innerText = reset1.toLocaleString();
        document.getElementById('reset1-cost').innerText = formatNumber(r1Cost);
        document.getElementById('reset2-amount').innerText = reset2.toLocaleString();
        
        // 리셋2 가격 표시제어 (리셋2 달성 전에는 무한대값 숫자로 표시, 리셋2 달성 후에는 무한돌파이므로 고정문구 가능)
        document.getElementById('reset2-cost').innerText = reset2 > 0 ? "1.79e308 (Infinite)" : formatNumber(r2Cost);

        // 최대 구매(MAX) 버튼 노출 조건: 리셋 1을 1회 이상 했거나 리셋 2를 1회 이상 했을 때
        if (reset1 > 0 || reset2 > 0) {
            document.getElementById('btn-buy-max').style.display = "flex";
        } else {
            document.getElementById('btn-buy-max').style.display = "none";
        }

        // 버튼 활성화/비활성화 제어
        document.getElementById('btn-upgrade1').disabled = (points.lt(5) || upgrade1.gte(maxUp1));
        document.getElementById('btn-buy-max').disabled = (points.lt(5) || upgrade1.gte(maxUp1));
        
        // 리셋1은 리셋2 전까지만 일반 제한 적용, 리셋2 비용인 Infinite 도달 시에는 리셋1 불필요하므로 비활성 처리 가능하지만 규칙대로 유지
        document.getElementById('btn-reset1').disabled = points.lt(r1Cost);
        document.getElementById('btn-reset2').disabled = points.lt(r2Cost);
    }

    // --- 게임 액션 기능 ---

    // 업그레이드 1 낱개 구매
    function buyUpgrade1() {
        const maxUp1 = getMaxUpgrade1Limit();
        if (points.gte(5) && upgrade1.lt(maxUp1)) {
            points = points.sub(5);
            upgrade1 = upgrade1.add(1);
            updateUI();
        }
    }

    // [신규] 업그레이드 1 최대 구매 (연산 랙 전혀 없는 다이렉트 수식 처리)
    function buyMaxUpgrade1() {
        const maxUp1 = getMaxUpgrade1Limit();
        if (points.lt(5) || upgrade1.gte(maxUp1)) return;

        // 고정 가격이 5이므로 구매 가능한 최대 개수는 Math.floor(points / 5)
        let affordable = points.div(5).floor();
        let targetAmount = upgrade1.add(affordable);

        // 상한선 제한 처리
        if (targetAmount.gt(maxUp1)) {
            affordable = maxUp1.sub(upgrade1);
        }

        if (affordable.gt(0)) {
            points = points.sub(affordable.mul(5));
            upgrade1 = upgrade1.add(affordable);
            updateUI();
        }
    }

    // 리셋 1 실행
    function triggerReset1() {
        const cost = getReset1Cost();
        if (points.gte(cost)) {
            reset1++;
            points = D(0);
            upgrade1 = D(0);
            updateUI();
        }
    }

    // [신규] 리셋 2 실행
    function triggerReset2() {
        const cost = getReset2Cost();
        if (points.gte(cost)) {
            reset2++;
            // 리셋 2 효과: 포인트, 업그레이드1, 그리고 리셋1까지 모두 초기화
            points = D(0);
            upgrade1 = D(0);
            reset1 = 0; 
            updateUI();
        }
    }

    // --- 게임 루프 (0.1초마다 생산) ---
    setInterval(() => {
        let gain = getPPS().div(10);
        points = points.add(gain);

        // 리셋2(breakinfinity 해금)를 안 한 상태라면 1.8e308 근처에서 포인트 강제 고정
        if (reset2 === 0 && points.gt(MAX_BEFORE_BREAK)) {
            points = MAX_BEFORE_BREAK;
        }

        updateUI();
    }, 100);

    // 최초 UI 업데이트
    updateUI();
</script>

</body>
</html>
