<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Portal Puzzle</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #000; display: block; max-width: 100%; max-height: 60%; border-bottom: 2px solid #444; }
        
        /* 모바일 컨트롤러 */
        #controls { width: 100%; flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; box-sizing: border-box; }
        .btn { background: #444; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; -webkit-user-select: none; }
        .btn:active { background: #666; }
        #jump-btn { grid-column: 3; background: #2980b9; }
        
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">Level: <span id="lvl-num">1</span></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
        <div class="btn" id="left-btn">◀</div>
        <div class="btn" id="right-btn">▶</div>
        <div class="btn" id="jump-btn">JUMP</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const lvlDisp = document.getElementById('lvl-num');

// 게임 설정
canvas.width = 400;
canvas.height = 400;

let currentLevel = 0;
let keys = { left: false, right: false, jump: false };

const player = {
    x: 50, y: 300, w: 20, h: 20,
    vx: 0, vy: 0,
    speed: 3, jumpPower: -8,
    grounded: false,
    portalCooldown: 0
};

// 레벨 디자인 (1: 벽, 2: 포탈A, 3: 포탈B, 4: 골인)
const levels = [
    { // Level 1: 입문
        start: {x: 50, y: 330},
        walls: [[0,380,400,20], [0,0,20,400], [380,0,20,400], [150,250,100,20]],
        portals: [{a: {x: 50, y: 350}, b: {x: 200, y: 220}}],
        goal: {x: 330, y: 330}
    },
    { // Level 2: 낙하 활용
        start: {x: 40, y: 100},
        walls: [[0,150,150,20], [250,300,150,20], [0,380,400,20]],
        portals: [{a: {x: 100, y: 350}, b: {x: 300, y: 50}}],
        goal: {x: 330, y: 250}
    },
    { // Level 3: 정교한 점프
        start: {x: 30, y: 330},
        walls: [[0,380,100,20], [150,280,100,20], [300,180,100,20], [0,100,100,20]],
        portals: [{a: {x: 50, y: 70}, b: {x: 350, y: 350}}],
        goal: {x: 350, y: 130}
    }
];

function initLevel(idx) {
    const l = levels[idx];
    player.x = l.start.x;
    player.y = l.start.y;
    player.vx = 0; player.vy = 0;
    lvlDisp.innerText = idx + 1;
}

// 터치 이벤트 등록
function bindBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    // PC 테스트용
    btn.addEventListener('mousedown', () => keys[key] = true);
    btn.addEventListener('mouseup', () => keys[key] = false);
}
bindBtn('left-btn', 'left');
bindBtn('right-btn', 'right');
bindBtn('jump-btn', 'jump');

function update() {
    // 이동 로직
    if (keys.left) player.vx = -player.speed;
    else if (keys.right) player.vx = player.speed;
    else player.vx *= 0.8;

    if (keys.jump && player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
    }

    player.vy += 0.4; // 중력
    player.x += player.vx;
    player.y += player.vy;

    const level = levels[currentLevel];
    player.grounded = false;

    // 벽 충돌 처리
    level.walls.forEach(w => {
        if (player.x < w[0] + w[2] && player.x + player.w > w[0] &&
            player.y < w[1] + w[3] && player.y + player.h > w[1]) {
            // 바닥 충돌
            if (player.vy > 0 && player.y + player.h - player.vy <= w[1]) {
                player.y = w[1] - player.h;
                player.vy = 0;
                player.grounded = true;
            } 
            // 천장 충돌
            else if (player.vy < 0 && player.y - player.vy >= w[1] + w[3]) {
                player.y = w[1] + w[3];
                player.vy = 0;
            }
            // 옆면
            else {
                player.x -= player.vx;
            }
        }
    });

    // 포탈 처리
    if (player.portalCooldown > 0) player.portalCooldown--;
    
    level.portals.forEach(p => {
        if (player.portalCooldown === 0) {
            // A로 진입
            if (Math.hypot(player.x - p.a.x, player.y - p.a.y) < 25) {
                player.x = p.b.x; player.y = p.b.y;
                player.portalCooldown = 30;
            }
            // B로 진입
            else if (Math.hypot(player.x - p.b.x, player.y - p.b.y) < 25) {
                player.x = p.a.x; player.y = p.a.y;
                player.portalCooldown = 30;
            }
        }
    });

    // 골인 체크
    if (Math.hypot(player.x - level.goal.x, player.y - level.goal.y) < 20) {
        currentLevel++;
        if (currentLevel >= levels.length) {
            alert("축하합니다! 모든 퍼즐을 풀었습니다.");
            currentLevel = 0;
        }
        initLevel(currentLevel);
    }

    // 화면 밖으로 떨어짐 방지
    if (player.y > 500) initLevel(currentLevel);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const level = levels[currentLevel];

    // 벽 그리기
    ctx.fillStyle = '#777';
    level.walls.forEach(w => ctx.fillRect(...w));

    // 포탈 그리기
    level.portals.forEach(p => {
        ctx.strokeStyle = '#00a2ff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(p.a.x, p.a.y, 15, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = '#ff9600';
        ctx.beginPath(); ctx.arc(p.b.x, p.b.y, 15, 0, Math.PI*2); ctx.stroke();
    });

    // 목적지
    ctx.fillStyle = '#2ecc71';
    ctx.beginPath(); ctx.arc(level.goal.x, level.goal.y, 10, 0, Math.PI*2); ctx.fill();

    // 플레이어
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

initLevel(0);
draw();
</script>
</body>
</html>
