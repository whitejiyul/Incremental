<!DOCTYPE html>
<html>
<head>
    <title>AD Ultra-Clone</title>
    <!-- 대용량 숫자 처리를 위해 라이브러리 로드 권장 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/break_infinity.js/2.0.4/break_infinity.min.js"></script>
    <style>
        body { background: #000; color: #ccc; font-family: 'Courier New', monospace; }
        .container { padding: 20px; }
        .stat-box { font-size: 1.2em; margin-bottom: 20px; color: #fff; }
        .dim-row { display: flex; align-items: center; margin: 5px 0; border: 1px solid #333; padding: 5px; }
        .dim-info { width: 300px; }
        button { background: #111; color: #fff; border: 1px solid #444; padding: 5px 15px; cursor: pointer; }
        button:hover { background: #222; }
        button:disabled { color: #444; border-color: #222; }
        .btn-reset { border-color: #00f; margin-right: 10px; }
        .btn-sacrifice { border-color: #f00; }
    </style>
</head>
<body>
<div class="container">
    <div class="stat-box">
        You have <span id="antimatter" style="color: #ffcc00;">10.00</span> antimatter.<br>
        <small>Tickspeed: <span id="tickspeed">1000</span>ms (-<span id="ts-mult">11.1</span>% per upgrade)</small>
    </div>

    <!-- 리셋 버튼들 -->
    <div style="margin-bottom: 20px;">
        <button id="dim-boost" class="btn-reset" onclick="dimensionBoost()">Dimension Boost (0): Requires 20 D4</button>
        <button id="galaxy" class="btn-reset" onclick="galaxyReset()">Galaxy (0): Requires 80 D8</button>
        <button id="sacrifice" class="btn-sacrifice" onclick="sacrifice()">Sacrifice (x1.00)</button>
    </div>

    <div id="dimensions-container">
        <!-- JS에서 차원 8개를 생성 -->
    </div>
</div>

<script>
    // Decimal 라이브러리 간편 호출 (Decimal = Decimal.default)
    const D = Decimal;
    
    let player = {
        antimatter: new D(10),
        dims: Array.from({length: 8}, (_, i) => ({
            cost: new D(10).times(new D(10).pow(i * (i + 1))), // AD 고유 가격 스케일링
            amount: new D(0),
            bought: 0,
            multi: new D(1),
            baseCost: new D(10).times(new D(10).pow(i * (i + 1))),
            costMult: new D(10).pow(i + 1)
        })),
        boosts: 0,
        galaxies: 0,
        sacMulti: new D(1),
        tickspeed: 1000,
        tsCost: new D(1000)
    };

    function update() {
        // 생산 로직: 상위 차원이 하위 차원을 생산 (8->7, 7->6... 1->Antimatter)
        for (let i = 7; i > 0; i--) {
            player.dims[i-1].amount = player.dims[i-1].amount.plus(
                player.dims[i].amount.times(player.dims[i].multi).times(0.1)
            );
        }
        player.antimatter = player.antimatter.plus(
            player.dims[0].amount.times(player.dims[0].multi).times(0.1)
        );

        render();
    }

    function buyDim(i) {
        let d = player.dims[i];
        if (player.antimatter.gte(d.cost)) {
            player.antimatter = player.antimatter.minus(d.cost);
            d.amount = d.amount.plus(1);
            d.bought++;
            
            // 10개 구매 시마다 배율 2배 및 가격 상승
            if (d.bought % 10 === 0) {
                d.multi = d.multi.times(2);
                d.cost = d.cost.times(d.costMult);
            }
        }
    }

    function sacrifice() {
        // 8차원 배율을 (1차원 개수 / 10)에 비례해서 증가 (실제 AD 공식 변형)
        let bonus = player.dims[0].amount.div(10).max(1).pow(0.2);
        player.sacMulti = player.sacMulti.times(bonus);
        // 1~7차원 초기화
        for(let i=0; i<7; i++) player.dims[i].amount = new D(0);
    }

    function dimensionBoost() {
        player.boosts++;
        resetCommon();
        // 부스트 보너스: 1차원 배율 x2 (중첩)
        player.dims[0].multi = player.dims[0].multi.times(2);
    }

    function galaxyReset() {
        player.galaxies++;
        resetCommon();
        // 은하 보너스: 틱스피드 배율 강화 (기본 11% -> 13% ...)
    }

    function resetCommon() {
        player.antimatter = new D(10);
        player.dims.forEach(d => { d.amount = new D(0); d.bought = 0; d.cost = d.baseCost; d.multi = new D(1); });
    }

    function render() {
        document.getElementById('antimatter').innerText = player.antimatter.toExponential(2);
        // ... 생략된 UI 업데이트 로직 (각 차원 버튼 및 텍스트 갱신)
    }

    setInterval(update, 100);
</script>
</body>
</html>
