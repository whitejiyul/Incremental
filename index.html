<!DOCTYPE html>
<html>
<head>
    <title>X Incremental</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; text-align: center; padding-top: 50px; }
        .resource { font-size: 2em; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; background: #333; color: white; border: 1px solid #555; }
        button:hover { background: #444; }
        .upgrade-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="resource">X: <span id="count">0</span></div>
    <button onclick="clickX()">X 생성</button>

    <div class="upgrade-section">
        <h3>점진적 확장 (Upgrades)</h3>
        <button id="upgBtn" onclick="buyUpgrade()">자동 생성기 구매 (비용: 10)</button>
    </div>

    <script>
        let x = 0;
        let autoRate = 0;
        let upgradeCost = 10;

        function clickX() {
            x += 1;
            updateDisplay();
        }

        function buyUpgrade() {
            if (x >= upgradeCost) {
                x -= upgradeCost;
                autoRate += 1;
                upgradeCost = Math.round(upgradeCost * 1.15); // 15% 복리 증가
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('count').innerText = Math.floor(x);
            document.getElementById('upgBtn').innerText = `자동 생성기 구매 (비용: ${upgradeCost})`;
        }

        // 1% 법칙을 넘어서는 루프: 0.1초마다 실행
        setInterval(() => {
            x += autoRate / 10;
            updateDisplay();
        }, 100);
    </script>
</body>
</html>
