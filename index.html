<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인크리멘탈 IDLE 게임</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #2a2a35;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #4caf50; margin-top: 0; }
        .stats {
            background: #333344;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .section-title {
            border-bottom: 2px solid #444;
            padding-bottom: 5px;
            margin-top: 20px;
            color: #81c784;
        }
        .btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            margin-bottom: 10px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn:hover { background-color: #45a049; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn { background-color: #e91e63; }
        .reset-btn:hover { background-color: #d81b60; }
        .info-text { font-size: 0.85rem; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <h1>자동 인크리멘탈 게임</h1>
    
    <div class="stats">
        <div>보유 포인트: <span id="points" class="highlight">0.0</span> p</div>
        <div>초당 생산량 (인컴): <span id="pps" class="highlight">1.0</span> p/s</div>
        <div>리셋 횟수: <span id="reset-count">0</span>회 (포인트 획득 배수: <span id="reset-multiplier">x1</span>)</div>
    </div>

    <h3 class="section-title">리셋 (Prestige)</h3>
    <button id="reset-button" class="btn reset-btn" onclick="prestige()">
        <div>
            <strong>다음 단계로 리셋</strong><br>
            <span class="info-text">다음 업그레이드 해금 & 배수 +1</span>
        </div>
        <span id="reset-cost">비용: 100 p</span>
    </button>

    <h3 class="section-title">업그레이드 목록</h3>
    <div id="upgrades-container">
        </div>
</div>

<script>
    // 게임 상태 선언
    let state = {
        points: 0,
        resetCount: 0,
        upgrades: {
            1: { amount: 0, cost: 5, basePps: 1 }
        }
    };

    // 24번째 업그레이드까지 초기 데이터 구조 세팅 함수
    function initUpgrades() {
        for (let i = 2; i <= 24; i++) {
            if (!state.upgrades[i]) {
                state.upgrades[i] = {
                    amount: 0,
                    cost: 5 * Math.pow(10, i),
                    basePps: 0 // 이후 업그레이드는 기본 p/s는 0이며, 다음 업글이 시너지를 줌
                };
            }
        }
    }
    initUpgrades();

    // 과학적 표기법 변환 함수 (숫자가 너무 커질 때 대비)
    function format(num) {
        if (num >= 1e9) {
            return num.toExponential(2);
        }
        return num.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    }

    // 리셋 비용 계산 공식: 100^(amount + 1.01^amount)
    function getResetCost() {
        let amt = state.resetCount;
        let exponent = amt + Math.pow(1.01, amt);
        return Math.pow(100, exponent);
    }

    // 초당 총 생산량(PPS) 계산
    function calculateTotalPps() {
        // 뒤의 업그레이드가 앞의 업그레이드 베이스를 올려주는 보너스 계산
        // 보너스 배열 초기화
        let bonus = {};
        for (let i = 1; i <= 24; i++) bonus[i] = 0;

        // 역순으로 추적하여 이전 업그레이드에 보너스 부여 (+0.2 * amount)
        for (let i = 24; i >= 2; i--) {
            if (state.upgrades[i] && state.upgrades[i].amount > 0) {
                bonus[i - 1] += 0.2 * state.upgrades[i].amount;
            }
        }

        // 총 PPS 합산 (기본 초당 1포인트 제공 포함)
        let totalBase = 1;
        for (let i = 1; i <= 24; i++) {
            let upg = state.upgrades[i];
            let effectiveBase = upg.basePps + bonus[i];
            totalBase += effectiveBase * upg.amount;
        }

        // 리셋 배수 적용 (리셋 0회면 x1, 1회면 x2 ...)
        let multiplier = state.resetCount + 1;
        return totalBase * multiplier;
    }

    // 업그레이드 구매 함수
    function buyUpgrade(id) {
        let upg = state.upgrades[id];
        if (state.points >= upg.cost) {
            state.points -= upg.cost;
            upg.amount++;
            
            // 업그레이드 1은 가격 고정(5), 나머지는 가격 공식이 필요하다면 이곳에서 확장 가능하나 
            // 조건 상 고정(5*10^n)으로 주어졌으므로 유지합니다.
            
            updateUI();
        }
    }

    // 리셋(프레스티지) 실행 함수
    function prestige() {
        let cost = getResetCost();
        if (state.points >= cost) {
            state.points = 0;
            state.resetCount++;
            
            // 업그레이드 갯수 및 가격 초기화 (구매량은 리셋)
            for (let i = 1; i <= 24; i++) {
                state.upgrades[i].amount = 0;
            }
            
            updateUI();
        }
    }

    // UI 갱신 렌더링 함수
    function updateUI() {
        let currentPps = calculateTotalPps();
        document.getElementById('points').innerText = format(state.points);
        document.getElementById('pps').innerText = format(currentPps);
        document.getElementById('reset-count').innerText = state.resetCount;
        document.getElementById('reset-multiplier').innerText = "x" + (state.resetCount + 1);

        // 리셋 버튼 업데이트
        let resetCost = getResetCost();
        document.getElementById('reset-cost').innerText = "비용: " + format(resetCost) + " p";
        document.getElementById('reset-button').disabled = state.points < resetCost;

        // 업그레이드 리스트 컨테이너 동적 생성
        let container = document.getElementById('upgrades-container');
        container.innerHTML = '';

        // 해금될 업그레이드 개수: 기본 1개 + 리셋 횟수만큼 추가 (최대 24개)
        let unlockedCount = Math.min(24, 1 + state.resetCount);

        // 실시간 보너스 수치 미리 계산 (UI 표시용)
        let bonus = {};
        for (let i = 1; i <= 24; i++) bonus[i] = 0;
        for (let i = 24; i >= 2; i--) {
            bonus[i - 1] += 0.2 * state.upgrades[i].amount;
        }

        for (let i = 1; i <= unlockedCount; i++) {
            let upg = state.upgrades[i];
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.disabled = state.points < upg.cost;
            btn.onclick = () => buyUpgrade(i);

            // 툴팁 및 이펙트 설명 텍스트 작성
            let effectText = "";
            if (i === 1) {
                effectText = `기본 +${upg.basePps} p/s`;
            } else {
                effectText = `업글 ${i-1}의 베이스 증가 (+0.2×개수)`;
            }

            // 현재 적용중인 보너스가 있다면 표시
            let bonusText = bonus[i] > 0 ? ` <span style="color:#00e676;">(+${bonus[i].toFixed(1)} 시너지)</span>` : "";

            btn.innerHTML = `
                <div>
                    <strong>업그레이드 ${i}</strong> [구매: ${upg.amount}개]<br>
                    <span class="info-text">${effectText}${bonusText}</span>
                </div>
                <span>비용: ${format(upg.cost)} p</span>
            `;
            container.appendChild(btn);
        }
    }

    // 게임 루프 (초당 10번 실행하여 부드럽게 포인트 추가 -> 0.1초마다 pps/10 만큼 증가)
    setInterval(() => {
        let pps = calculateTotalPps();
        state.points += pps / 10;
        
        // 주기적으로 화면 갱신 (성능 최적화를 위해 데이터 갱신 루프 내부에서 동시 처리)
        // 버튼 활성화/비활성화 상태를 실시간 반영하기 위함
        let currentPps = calculateTotalPps();
        document.getElementById('points').innerText = format(state.points);
        document.getElementById('pps').innerText = format(currentPps);
        
        // 버튼들의 disabled 상태만 부분 주기적 업데이트 (매번 전체 재생성하면 버벅이므로 비용만 체크)
        let resetCost = getResetCost();
        document.getElementById('reset-button').disabled = state.points < resetCost;
        
        let buttons = document.getElementById('upgrades-container').getElementsByClassName('btn');
        let unlockedCount = Math.min(24, 1 + state.resetCount);
        if(buttons.length === unlockedCount) {
            for(let i=1; i<=unlockedCount; i++) {
                buttons[i-1].disabled = state.points < state.upgrades[i].cost;
            }
        } else {
            updateUI(); // 개수가 맞지 않으면 전체 다시 그리기
        }
    }, 100);

    // 첫 실행 시 초기 UI 렌더링
    updateUI();
</script>

</body>
</html>
